# kitty.conf — config de base + contrôle distant (pour The Matrix)
# Doc : https://sw.kovidgoyal.net/kitty/conf/
# NB : kitty n'accepte PAS de commentaire en fin de ligne d'option — toujours sur sa propre ligne.

# ── Apparence ──
font_size            11.0
scrollback_lines     10000
enable_audio_bell    no
confirm_os_window_close 0

# ── Confort ──
copy_on_select        yes
strip_trailing_spaces smart
# cwd/prompt connus (utile pour kitty @ ls / The Matrix).
shell_integration     enabled
# Schémas cliquables (URLs brutes) : défauts kitty + obsidian:// (liens vault Omniscience).
url_prefixes file ftp ftps gemini git gopher http https irc ircs kitty mailto news sftp ssh obsidian
url_style             curly
# Ctrl+clic (en plus du ctrl+shift+clic par defaut) pour ouvrir une URL sous le curseur.
mouse_map ctrl+left release grabbed,ungrabbed mouse_click_url
mouse_hide_wait       3.0
window_padding_width  4

# ── Onglets ──
tab_bar_style     powerline
# Barre d'onglets masquée s'il n'y a qu'un seul onglet.
tab_bar_min_tabs  1
tab_title_template "{index}: {title}"

# ── Layouts cyclables (next_layout) ──
enabled_layouts   tall,fat,stack

# ── Zoom : plein écran du pane courant (bascule split ↔ stack) ──
# Dans un split (ccs + gtlb), ces TUI en écran alterné ne scrollent pas au-delà de
# la hauteur du pane. Ce toggle donne toute la hauteur du terminal au pane focalisé
# pour tout voir, puis Ctrl+Shift+Z à nouveau revient au split. Alterner les panes
# quand on est zoomé : Ctrl+Shift+] / Ctrl+Shift+[.
map ctrl+shift+z toggle_layout stack

# ── Contrôle distant (The Matrix : focus depuis ccs, set-window-title permanent) ──
# Une socket par instance ({kitty_pid}) → pas de conflit entre process indépendants,
# et pas de serveur --single-instance qui peut rester bloqué sans fenêtre.
allow_remote_control yes
listen_on            unix:/tmp/kitty-{kitty_pid}

# ── Copier/coller façon "app" ──
# Ctrl+C copie s'il y a une sélection, sinon SIGINT. Ctrl+V colle. (Ctrl+Shift+C/V restent.)
map ctrl+c copy_or_interrupt
map ctrl+v paste_from_clipboard

# ── Ctrl+Z → undo (au lieu de suspend) ──
# Claude Code capte lui-même Ctrl+Z (0x1A) pour se suspendre : ni stty susp ni les
# keybindings Claude ne l'arrêtent. On intercepte la touche ici, avant qu'elle
# atteigne le programme, et on envoie à la place Ctrl+_ (0x1F) = « undo » (défaut de
# chat:undo dans Claude, et de undo dans zle). Effet global kitty : Ctrl+Z annule au
# lieu de suspendre un job.
map ctrl+z send_text all \x1f
