# Config dédiée à la fenêtre « The Matrix » (ccs).
# Lancée via :  kitty --config matrix-window.conf --title "The Matrix" zsh -ic ccs
# Hérite de la config de base, puis applique le thème vert et (optionnel) le fond.

include kitty.conf
include matrix.conf

# ── Fond d'écran Matrix ──
# 1) Déposer un PNG ici :  ~/.config/kitty/matrix-bg.png
# 2) Décommenter les 4 lignes ci-dessous.
#    (background_tint proche de 0.90 = image assombrie derrière le texte → lisibilité)
background_image        /home/r3n0j/.config/kitty/matrix-bg.png
background_image_layout cscaled
background_tint         0.97
background_tint_gaps    1.0
